name: refresh-gsc
on:
  schedule:
    - cron: '23 * * * *'   # hourly (~:23 past each hour) — matches GSC's hourly freshness
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: refresh
  cancel-in-progress: false
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --quiet google-auth requests
      - name: Pull GSC data
        env:
          GSC_SA_JSON: ${{ secrets.GSC_SA_JSON }}
          BLITZ_KEY: ${{ secrets.BLITZ_KEY }}
          BLITZ_AID: ${{ secrets.BLITZ_AID }}
        run: python pull.py
      - name: Commit refreshed data
        run: |
          git config user.name "cz-dash-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json history.json
          git commit -m "chore: hourly GSC refresh [skip ci]" || { echo "no changes to commit"; exit 0; }
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "retry $i"; sleep 6
          done
          echo "push failed"; exit 1
