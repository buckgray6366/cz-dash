name: refresh-gsc
on:
  schedule:
    - cron: '23 * * * *'   # hourly (~:23 past each hour) — matches GSC's hourly freshness
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: refresh
  cancel-in-progress: false
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --quiet google-auth requests
      - name: Pull GSC data
        env:
          GSC_SA_JSON: ${{ secrets.GSC_SA_JSON }}
        run: python pull.py
      - name: Commit refreshed data
        run: |
          git config user.name "cz-dash-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json history.json
          git diff --staged --quiet || git commit -m "chore: daily GSC data refresh [skip ci]"
          git push
